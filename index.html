        <div class="product-grid" id="sale-grid">
            </div>

    <section id="products" class="products">
        <h2 class="section-title">Latest Digital Inventory</h2>
        <div class="product-grid" id="main-grid">
            </div>
    </section>

    <div id="orderModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeOrder()">&times;</span>
            <h2 id="modalTitle" style="margin-bottom:10px;">Product Name</h2>
            <div id="productPreview" style="margin-bottom: 15px;"></div>
            
            <form id="checkoutForm">
                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <div style="flex:1;">
                        <label>Color:</label>
                        <select id="pColor"><option>Natural Titanium</option><option>Deep Blue</option><option>Space Gray</option><option>Silver</option></select>
                    </div>
                    <div style="flex:1;">
                        <label>Storage/Size:</label>
                        <select id="pSize"><option>128GB</option><option>256GB</option><option>512GB</option><option>1TB</option></select>
                    </div>
                </div>
                
                <input type="text" id="custName" placeholder="Your Full Name" required>
                <input type="tel" id="custPhone" placeholder="Mobile Number" required>
                <textarea id="custAddress" placeholder="Delivery Address" required style="height: 80px;"></textarea>
                
                <div class="payment-group" style="margin-bottom: 20px;">
                    <label>Payment Method:</label>
                    <select id="pMethod">
                        <option value="cod">Cash on Delivery (COD)</option>
                        <option value="bank">Bank Transfer / JazzCash</option>
                    </select>
                </div>

                <button type="submit" class="buy-btn">Confirm Order</button>
            </form>
        </div>
    </div>

    <div id="successBox" class="modal" style="display:none;">
        <div class="modal-content" style="text-align:center; padding: 50px;">
            <i class="fas fa-check-circle" style="font-size: 70px; color: #22c55e; margin-bottom: 20px;"></i>
            <h2>Order Placed!</h2>
            <p>Your order has been confirmed. For any queries, call us at 03080136046.</p>
            <button class="buy-btn" onclick="location.reload()" style="margin-top:20px;">Close</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Alsheikhs Store | For Support: 03080136046</p>
    </footer>

        function renderProducts() {
            const mainGrid = document.getElementById('main-grid');
            const saleGrid = document.getElementById('sale-grid');
            
            products.forEach(p => {
                const html = `
                    <div class="product-card">
                        ${p.sale ? '<div class="badge-sale">SALE</div>' : ''}
                        <img src="${p.img}?q=80&w=600" alt="${p.name}">
                        <h3>${p.name}</h3>
                        <p class="price">
                            ${p.sale ? `<span class="old-price">Rs. ${p.old}</span>` : ''}
                            Rs. ${p.price}
                        </p>
                        <button class="buy-btn" onclick="openOrder('${p.name}', '${p.price}', '${p.img}')">Order Now</button>
                    </div>`;
                mainGrid.innerHTML += html;
                if(p.sale) saleGrid.innerHTML += html;
            });
        }

        function openOrder(name, price, img) {
            document.getElementById('modalTitle').innerText = name;
            document.getElementById('productPreview').innerHTML = `<img src="${img}" style="width:100%; height:150px; object-fit:cover; border-radius:15px;">`;
            document.getElementById('orderModal').style.display = 'flex';
        }

        function closeOrder() { document.getElementById('orderModal').style.display = 'none'; }

        document.getElementById('checkoutForm').onsubmit = function(e) {
            e.preventDefault();
            document.getElementById('orderModal').style.display = 'none';
            document.getElementById('successBox').style.display = 'flex';
        }

        window.onload = renderProducts;
    </script>
